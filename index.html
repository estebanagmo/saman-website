<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samán — Simplifica y automatiza tus procesos de compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a4a30;
      --accent: #52b788;
      --accent-dark: #3a9268;
      --text: #1a2e22;
      --muted: #78968a;
      --border: #d8ede3;
      --surface: #f3faf6;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--muted);
      background: var(--surface);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      width: 100%;
      max-width: 1080px;
      margin-inline: auto;
      padding-inline: 32px;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-block: 14px;
    }
    nav img { height: 24px; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-btn {
      display: inline-flex;
      padding: 4px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: none;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity .2s ease, border-color .2s ease;
      line-height: 0;
    }
    .lang-btn svg { border-radius: 3px; display: block; width: 21px; height: 14.5px; }
    .lang-btn:hover { opacity: 0.8; }
    .lang-btn.active {
      opacity: 1;
      border-color: var(--accent);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 20px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 600;
      font-size: 0.84rem;
      text-decoration: none;
      transition: background .2s ease;
    }
    .btn:hover { background: var(--accent-dark); }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding-block: 60px;
    }
    h1 {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text);
      max-width: 66%;
      margin-bottom: 32px;
    }
    h1 span { color: var(--accent-dark); }
    .lede {
      font-size: 1.2rem;
      line-height: 1.7;
      max-width: 460px;
      margin-bottom: 44px;
    }
    .btn--lg { padding: 13px 36px; font-size: 0.95rem; }
    @media (max-width: 600px) {
      .wrap { padding-inline: 24px; }
      .nav-right { gap: 12px; }
      h1 { max-width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="wrap">
    <img src="assets/images/logo-saman.png" alt="Samán" />
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-es" onclick="setLang('es')" aria-label="Español" title="Español">
          <!-- Spain flag -->
          <svg width="26" height="18" viewBox="0 0 26 18" xmlns="http://www.w3.org/2000/svg">
            <rect width="26" height="18" fill="#AA151B"/>
            <rect y="4.5" width="26" height="9" fill="#F1BF00"/>
          </svg>
        </button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')" aria-label="English" title="English">
          <!-- US flag -->
          <svg width="26" height="18" viewBox="0 0 26 18" xmlns="http://www.w3.org/2000/svg">
            <rect width="26" height="18" fill="#FFFFFF"/>
            <g fill="#B22234">
              <rect y="0" width="26" height="1.385"/>
              <rect y="2.77" width="26" height="1.385"/>
              <rect y="5.54" width="26" height="1.385"/>
              <rect y="8.31" width="26" height="1.385"/>
              <rect y="11.08" width="26" height="1.385"/>
              <rect y="13.85" width="26" height="1.385"/>
              <rect y="16.62" width="26" height="1.385"/>
            </g>
            <rect width="11" height="9.7" fill="#3C3B6E"/>
            <g fill="#FFFFFF">
              <circle cx="2" cy="1.8" r="0.55"/><circle cx="4.5" cy="1.8" r="0.55"/><circle cx="7" cy="1.8" r="0.55"/><circle cx="9.5" cy="1.8" r="0.55"/>
              <circle cx="3.25" cy="3.5" r="0.55"/><circle cx="5.75" cy="3.5" r="0.55"/><circle cx="8.25" cy="3.5" r="0.55"/>
              <circle cx="2" cy="5.2" r="0.55"/><circle cx="4.5" cy="5.2" r="0.55"/><circle cx="7" cy="5.2" r="0.55"/><circle cx="9.5" cy="5.2" r="0.55"/>
              <circle cx="3.25" cy="6.9" r="0.55"/><circle cx="5.75" cy="6.9" r="0.55"/><circle cx="8.25" cy="6.9" r="0.55"/>
              <circle cx="2" cy="8.4" r="0.55"/><circle cx="4.5" cy="8.4" r="0.55"/><circle cx="7" cy="8.4" r="0.55"/><circle cx="9.5" cy="8.4" r="0.55"/>
            </g>
          </svg>
        </button>
      </div>
      <a href="contact.html" class="btn" data-i18n="cta">Contáctanos</a>
    </div>
  </nav>

  <main>
    <div class="wrap">
      <h1 data-i18n="headline">Simplifica, <span>automatiza</span> y mejora tu margen en procesos de compras.</h1>
      <p class="lede" data-i18n="lede">Reenfoca tu equipo de compras de lo táctico a lo estratégico.</p>
      <a href="contact.html" class="btn btn--lg" data-i18n="cta">Contáctanos</a>
    </div>
  </main>

  <script>
    const i18n = {
      es: {
        headline: 'Simplifica, <span>automatiza</span> y mejora tu margen en procesos de compras.',
        lede: 'Reenfoca tu equipo de compras de lo táctico a lo estratégico.',
        cta: 'Contáctanos',
        title: 'Samán — Simplifica y automatiza tus procesos de compras'
      },
      en: {
        headline: 'Simplify, <span>automate</span> and boost your margin in procurement.',
        lede: 'Uplevel your procurement team from tactical to strategic work.',
        cta: 'Contact us',
        title: 'Samán — Simplify and automate your procurement'
      }
    };

    function setLang(lang) {
      const t = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerHTML = t[el.dataset.i18n];
      });
      document.documentElement.lang = lang;
      document.title = t.title;
      document.getElementById('btn-es').classList.toggle('active', lang === 'es');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      try { localStorage.setItem('saman-lang', lang); } catch (e) {}
    }

    try {
      const saved = localStorage.getItem('saman-lang');
      if (saved && i18n[saved]) setLang(saved);
    } catch (e) {}
  </script>

</body>
</html>
